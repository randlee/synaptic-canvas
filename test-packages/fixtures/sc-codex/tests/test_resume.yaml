test_id: sc-codex-003
test_name: Resume a Codex task
description: |
  Run a Codex task, then attempt to resume using the derived agentId.
  The stable contract is that the flow either completes with a refined result
  and grade, or returns a concise error report that explicitly stops when the
  resume transcript cannot be reused.

execution:
  prompt: |
    /sc-codex --background --model mini write a short haiku about rain. Capture the agentId and output_file, but do not tail the log.
    Verify the output_file exists, then derive <agentId> from the output_file filename (basename without .jsonl).
    Immediately run /sc-codex --json {"description":"Refine haiku","prompt":"Refine the previous haiku and improve imagery.","subagent_type":"sc-codex","model":"mini","resume":"<agentId>","run_in_background":false}.
    Replace <agentId> with the derived value, and return the refined haiku with a line `Grade: N` (N is 1-10).
    Do not run any other Codex tasks. If the resume call fails, report the error and stop.
  model: haiku
  tools:
    - Bash
  timeout_ms: 120000

expectations:
  - id: exp-001
    description: Output reflects either successful grading or explicit resume failure
    type: output_contains
    expected:
      pattern: '(Grade:\s*(10|[1-9])\b|resume operation failed|stopping here as instructed|error report)'
      flags: "i"

  - id: exp-002
    description: Output references the background handoff details
    type: output_contains
    expected:
      pattern: '(agentId|output_file|resume)'
      flags: "i"
