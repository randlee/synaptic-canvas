# Category B: Subagent CLEARLY expected (Task tool)
# Explicitly request Task tool usage - subagent MUST be spawned

test_id: subagent-task-001
test_name: Explicit Task tool usage spawns subagent
description: |
  Explicitly ask Claude to use a delegated subagent for a background operation.
  Current Claude CLI traces this through the `Agent` tool rather than the
  legacy `Task` tool name.

  Any delegated subagent run MUST produce SubagentStart/SubagentStop events.

tags:
  - subagent-required
  - task-tool
  - category-b

execution:
  prompt: |
    I want you to use the Task tool to count the number of files
    in this repository. Use Task, not Bash directly.
    The Task subagent should do the work.
  model: haiku
  tools:
    - Agent
    - Bash
    - Glob
  timeout_ms: 120000

expectations:
  # MUST happen: Agent tool invoked (modern replacement for Task)
  - id: exp-001
    description: Agent tool explicitly invoked
    type: tool_call
    expected:
      tool: Agent
      pattern: "count.*files|find \\. -type f"
      flags: "i"

  # MUST happen: user-visible result from the delegated task
  - id: exp-002
    description: Output reports the file count
    type: output_contains
    expected:
      pattern: "(contains|repository).*(files|file)|\\*\\*[0-9]+ files\\*\\*"
      flags: "i"

  # MUST happen: SubagentStart event
  - id: exp-003
    description: SubagentStart hook event captured
    type: hook_event
    expected:
      event: SubagentStart

  # MUST happen: SubagentStop event
  - id: exp-004
    description: SubagentStop hook event captured
    type: hook_event
    expected:
      event: SubagentStop

  # Correlation: SubagentStart and SubagentStop have same agent_id
  - id: exp-005
    description: SubagentStart and SubagentStop share agent_id
    type: subagent_lifecycle
    expected:
      events:
        - SubagentStart
        - SubagentStop
      correlation: agent_id
