# Category D: Control tests
# Same explore test but with sonnet model - compare to haiku

test_id: subagent-control-003
test_name: Explore agent with sonnet model
description: |
  Control test: same YAML discovery task but using the sonnet model.
  The stable contract is that the command returns the YAML file result while
  preserving the requested execution model, regardless of whether the trace
  includes explicit subagent hook events.

tags:
  - control
  - subagent-required
  - explore-agent
  - sonnet
  - category-d

execution:
  prompt: |
    Use the Explore agent to find all YAML files in this repository.
    Delegate to Explore - do not search yourself.
  model: sonnet
  tools:
    - Agent
    - Bash
    - Read
    - Glob
    - Grep
  timeout_ms: 120000

expectations:
  - id: exp-001
    description: Output reports the YAML file that was found
    type: output_contains
    expected:
      pattern: "(yaml|\\.ya?ml|registry\\.yaml)"
      flags: "i"

  - id: exp-002
    description: Execution used sonnet model
    type: execution_param
    expected:
      param: model
      value: sonnet
