# Category D: Control tests
# A skill that does NOT use subagents - verify no subagent events

test_id: subagent-control-001
test_name: Skill without subagent usage
description: |
  The `/delay --help` path should stay local and should not spawn subagents.
  This verifies that not all command invocations trigger delegated agents.

tags:
  - control
  - no-subagent
  - skill-invoked
  - category-d

execution:
  prompt: "/delay --help"
  model: haiku
  tools:
    - Read
  timeout_ms: 30000

setup:
  plugins:
    - sc-delay-tasks@synaptic-canvas

expectations:
  - id: exp-001
    description: Help output is shown
    type: output_contains
    expected:
      pattern: "(usage|options|minutes|seconds|poll)"
      flags: "i"

  # MUST NOT happen: No subagent for this simple skill
  - id: exp-002
    description: No SubagentStart hook event
    type: hook_event_absent
    expected:
      event: SubagentStart

  # MUST NOT happen: No subagent stop
  - id: exp-003
    description: No SubagentStop hook event
    type: hook_event_absent
    expected:
      event: SubagentStop

  # MUST NOT happen: No delegated Agent tool either
  - id: exp-004
    description: Agent tool NOT invoked
    type: tool_not_called
    expected:
      tool: Agent
