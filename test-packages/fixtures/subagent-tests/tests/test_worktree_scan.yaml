# Category C: Skill-invoked subagents
# The /sc-git-worktree scan command should invoke a scan agent

test_id: subagent-skill-002
test_name: Worktree skill invokes scan agent
description: |
  The /sc-git-worktree scan command should delegate scanning to the
  `sc-worktree-scan` agent and return a worktree status summary. Current
  traces do not reliably expose hook events or parent-level bash commands,
  but they do show the delegated agent invocation and final scan output.

tags:
  - subagent-required
  - skill-invoked
  - worktree
  - category-c

execution:
  prompt: "/sc-git-worktree scan"
  model: haiku
  tools:
    - Skill
    - Agent
    - Bash
    - Read
  timeout_ms: 90000

setup:
  plugins:
    - sc-git-worktree@synaptic-canvas

expectations:
  # MUST happen: Agent tool invoked for the scan subagent
  - id: exp-001
    description: Agent tool invoked for sc-worktree-scan
    type: tool_call
    expected:
      tool: Agent
      pattern: "sc-worktree-scan"

  # MUST happen: user-visible worktree status summary
  - id: exp-002
    description: Output reports worktree status
    type: output_contains
    expected:
      pattern: "(worktree status|active worktrees|tracked|recommendations)"
      flags: "i"

  # MUST happen: scan reports a concrete count or recommendation
  - id: exp-003
    description: Output includes scan details
    type: output_contains
    expected:
      pattern: "(2 active worktrees|dirty|clean|tracking)"
      flags: "i"
