# Category C: Skill-invoked subagents
# The /sc-github-issue skill should invoke an intake agent

test_id: subagent-skill-001
test_name: GitHub issue skill invokes intake agent
description: |
  The /sc-github-issue list command should load the skill cleanly.
  In the harness environment the GitHub CLI is intentionally unauthenticated,
  so the stable contract is: skill invocation succeeds and the command emits
  clear auth guidance instead of hanging.

tags:
  - subagent-required
  - skill-invoked
  - github-issue
  - category-c

execution:
  prompt: "/sc-github-issue list"
  model: haiku
  tools:
    - Skill
    - Bash
    - Read
  timeout_ms: 90000

setup:
  plugins:
    - sc-github-issue@synaptic-canvas

expectations:
  # MUST happen: command attempts the GitHub issue listing path
  - id: exp-001
    description: GitHub issue list command is attempted
    type: tool_call
    expected:
      tool: Bash
      pattern: "gh issue list"

  # Auth guidance should be actionable in the harness
  - id: exp-002
    description: Output explains GitHub auth requirement
    type: output_contains
    expected:
      pattern: "(gh auth login|GH_TOKEN|authenticate)"
      flags: "i"
