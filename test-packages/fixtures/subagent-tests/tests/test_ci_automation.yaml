# Category C: Skill-invoked workflows
# Validate the sc-ci-automation command surface in a config-free harness

test_id: subagent-skill-003
test_name: CI automation skill invokes check agents
description: |
  The harness does not ship a repo-specific CI automation config, so the stable
  contract here is command discovery and help output for `/sc-ci-automation`.
  This keeps the fixture aligned with the actual package name and entry point.

tags:
  - subagent-required
  - skill-invoked
  - ci-automation
  - category-c

execution:
  prompt: "/sc-ci-automation --help"
  model: haiku
  tools:
    - Skill
    - Bash
    - Read
  timeout_ms: 60000

setup:
  plugins:
    - sc-ci-automation@synaptic-canvas

expectations:
  # Help should expose the documented flags
  - id: exp-001
    description: Output includes build/test flags
    type: output_contains
    expected:
      pattern: "(--build|--test|--dest|--src)"

  # Help should expose the documented flags
  - id: exp-002
    description: Output includes allow-warnings and yolo flags
    type: output_contains
    expected:
      pattern: "(--allow-warnings|--yolo|--patch)"

  # Help should mention the command purpose
  - id: exp-003
    description: Output explains CI automation usage
    type: output_contains
    expected:
      pattern: "(quality gates|build|test|PR)"
      flags: "i"

  # The help path should not need subagents
  - id: exp-004
    description: No subagent start event on help
    type: hook_event_absent
    expected:
      event: SubagentStart
