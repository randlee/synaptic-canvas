name: sc-launchpad
version: 0.12.0
description: >
  Launch Claude, Codex, or Gemini as a separate background sub-agent runtime,
  with explicit ATM teammate-mode normalization and roster registration.
author: synaptic-canvas
license: MIT
tags:
  - background-agents
  - claude
  - codex
  - gemini
  - atm

artifacts:
  skills:
    - skills/launchpad/SKILL.md
  agents:
    - agents/launchpad.md
  scripts:
    - scripts/launchpad_shared.py
    - scripts/sc_launchpad_task.py

shared_scripts:
  - source: packages/shared/scripts/launchpad_shared.py
    target: scripts/launchpad_shared.py

requires:
  cli:
    - python3
    - claude
    - codex
    - gemini
  python:
    - pydantic
