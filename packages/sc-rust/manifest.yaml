name: sc-rust
version: 0.10.0
description: >
  Rust development toolkit: idiomatic guidelines, service hardening guidance,
  design pattern enforcement, and specialized agents for architecture, code review,
  exploration, implementation, and QA. Includes cross-platform portability
  guidelines for Ubuntu, macOS, and Windows.
author: randlee
license: MIT
tags:
  - rust
  - development
  - service-hardening
  - tokio
  - code-review
  - architecture
  - qa
  - agents
  - skills

# Files to install (relative to package root)
artifacts:
  skills:
    - skills/rust-development/SKILL.md
    - skills/rust-development/guidelines.txt
    - skills/rust-development/cross-platform-guidelines.md
    - skills/rust-best-practices/SKILL.md
    - skills/rust-best-practices/patterns/practice-inventory.md
    - skills/rust-best-practices/patterns/enforcement-strategy.md
    - skills/rust-best-practices/patterns/error-context-recovery-plan.md
    - skills/rust-best-practices/patterns/typestate-plan.md
    - skills/rust-best-practices/patterns/sealed-traits-plan.md
    - skills/rust-best-practices/patterns/newtype-zero-cost-plan.md
    - skills/rust-best-practices/patterns/deref-coercion-plan.md
    - skills/rust-best-practices/patterns/interior-mutability-plan.md
    - skills/rust-best-practices/patterns/infallible-plan.md
    - skills/rust-best-practices/patterns/trait-object-safety-plan.md
    - skills/rust-best-practices/patterns/cow-plan.md
    - skills/rust-best-practices/patterns/phantomdata-capability-token-plan.md
    - skills/rust-service-hardening/SKILL.md
    - skills/rust-service-hardening/references/production-checklist.md
    - skills/rust-service-hardening/references/framework-notes.md
  agents:
    - agents/rust-architect.md
    - agents/rust-code-reviewer.md
    - agents/rust-code-explorer.md
    - agents/rust-developer.md
    - agents/rust-qa-agent.md
    - agents/rust-best-practices-agent.md
    - agents/rust-service-hardening-agent.md
  assets:
    - assets/sc-rust/quality-mgr/quality-mgr.rust.md
    - assets/sc-rust/quality-mgr/templates/rust-best-practices-assignment.json.j2
    - assets/sc-rust/quality-mgr/templates/rust-service-hardening-assignment.json.j2

# Installation policy
install:
  scope: local-only  # installed into repo .claude/, not global

# Runtime requirements
requires:
  cli:
    - cargo >= 1.87
    - cargo-llvm-cov
