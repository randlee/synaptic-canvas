template_version = "0.1.0"

[repo]
name = ""

[help]
usage = "just <recipe>"

[[help.sections]]
title = "General"

[[help.sections.recipes]]
name = "help"
description = "Show this help."

[[help.sections.recipes]]
name = "lint"
description = "Run Python lint checks."

[[help.sections.recipes]]
name = "test"
description = "Run Python tests."

[[help.sections.recipes]]
name = "ci"
description = "Run lint and test."

[[help.sections]]
title = "Formatting"

[[help.sections.recipes]]
name = "fmt"
description = "Run the default formatting gate."

[[help.sections.recipes]]
name = "fmt [check|write|apply]"
description = "Run the default, non-mutating, or mutating formatting gate."

[fmt]
default_mode = "check"

[fmt.steps]
check = [
  ["{{python_cmd}}", "-m", "ruff", "format", "--check", "."],
  ["{{python_cmd}}", "-m", "ruff", "check", "."],
]
write = [
  ["{{python_cmd}}", "-m", "ruff", "format", "."],
  ["{{python_cmd}}", "-m", "ruff", "check", "--fix", "."],
]
apply = [
  ["{{python_cmd}}", "-m", "ruff", "format", "."],
  ["{{python_cmd}}", "-m", "ruff", "check", "--fix", "."],
]

[lint]
steps = [
  ["{{python_cmd}}", "-m", "ruff", "check", "."],
]

[test]
steps = [
  ["{{python_cmd}}", "-m", "pytest", "-q"],
]
