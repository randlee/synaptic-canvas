template_version = "0.1.0"

[repo]
name = ""

[help]
usage = "just <recipe>"

[[help.sections]]
title = "General"

[[help.sections.recipes]]
name = "help"
description = "Show this help."

[[help.sections.recipes]]
name = "build"
description = "Build the Rust workspace."

[[help.sections.recipes]]
name = "test"
description = "Run Rust tests."

[[help.sections.recipes]]
name = "ci"
description = "Run lint and test."

[[help.sections]]
title = "Formatting"

[[help.sections.recipes]]
name = "fmt"
description = "Run the default formatting gate."

[[help.sections.recipes]]
name = "fmt [check|write|apply]"
description = "Run the default, non-mutating, or mutating formatting gate."

[[help.sections]]
title = "Lint"

[[help.sections.recipes]]
name = "lint"
description = "Run the default lint set."

[[help.sections.recipes]]
name = "lint [all|fmt|clippy]"
description = "Run the default lint set or a Rust-only lint target."

[fmt]
default_mode = "check"

[fmt.steps]
check = [
  ["just", "_fmt-check"],
]
write = [
  ["just", "_fmt-write"],
]
apply = [
  ["just", "_fmt-write"],
]

[lint]
default_target = "all"

[lint.steps_by_target]
all = [
  ["just", "_lint-fmt"],
  ["just", "_lint-clippy"],
]
fmt = [
  ["just", "_lint-fmt"],
]
clippy = [
  ["just", "_lint-clippy"],
]
